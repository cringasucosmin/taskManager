<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">

<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">Task Manager</h1>
        <p class="auth-subtitle">Sign in to your account</p>

        <div id="error-message" class="alert alert-error" style="display:none;"></div>
        <div id="success-message" class="alert alert-success" style="display:none;"></div>

        <!-- Login Form -->
        <form id="login-form">
            <div class="form-group">
                <label for="login-username">Username</label>
                <input type="text" id="login-username" name="username" placeholder="Enter username" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" name="password" placeholder="Enter password" autocomplete="current-password">
            </div>
            <button type="submit" id="login-btn" class="btn btn-primary btn-full">Login</button>
        </form>

        <div class="auth-divider">
            <span>Don't have an account?</span>
        </div>

        <!-- Register Form -->
        <form id="register-form">
            <div class="form-group">
                <label for="register-username">Username</label>
                <input type="text" id="register-username" name="username" placeholder="Choose a username" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="register-password">Password</label>
                <input type="password" id="register-password" name="password" placeholder="Choose a password" autocomplete="new-password">
            </div>
            <button type="submit" id="register-btn" class="btn btn-secondary btn-full">Create Account</button>
        </form>
    </div>
</div>

<script src="/js/auth.js"></script>
</body>
</html>

name: QA Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java 17 (same version used locally)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Cache Maven dependencies (speeds up subsequent runs)
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # 4. Build the Spring Boot application (skip its own unit tests)
      - name: Build Spring Boot app
        run: mvn clean package -DskipTests
        working-directory: ./

      # 5. Start the app in the background on port 8080
      - name: Start Spring Boot app
        run: |
          nohup java -jar target/task-manager-app-1.0.0.jar &
          echo "App started in background, waiting for it to be ready..."
        working-directory: ./

      # 6. Wait until the app is actually responding on port 8080
      - name: Wait for app to be ready
        run: |
          echo "Waiting for Spring Boot to start on port 8080..."
          for i in {1..30}; do
            if curl -s http://localhost:8080 > /dev/null 2>&1; then
              echo "App is ready after $i seconds!"
              exit 0
            fi
            echo "Attempt $i/30 — not ready yet, waiting 2s..."
            sleep 2
          done
          echo "ERROR: App did not start within 60 seconds"
          exit 1

      # 7. Set up Chrome (ubuntu-latest has Chrome pre-installed, but this ensures latest)
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      # 8. Run all tests (headless mode for CI)
      - name: Run QA tests
        run: mvn test -Dheadless=true
        working-directory: ../test-framework

      # 9. Upload ExtentReport as artifact (viewable after run)
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ExtentReport
          path: test-framework/test-output/ExtentReport.html
          retention-days: 30

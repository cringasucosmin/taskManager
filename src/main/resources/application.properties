# Server
server.port=8080

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate (dialect is auto-detected for H2, no need to specify)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console (accessible at http://localhost:8080/h2-console — useful for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
